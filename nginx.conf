server {
    listen 80;
    listen [::]:80;
    server_name _;  # Barcha IP/domain uchun

    root /var/www/smart-camera;
    index index.html;

    # React SPA uchun — barcha route'larni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Katta fayllar uchun (opencv.js ~8MB bo'lishi mumkin)
    location ~* \.(js|css|png|jpg|svg|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Kamera API uchun HTTPS header (agar reverse proxy orqali ishlasa)
    add_header Permissions-Policy "camera=*";
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";
}
