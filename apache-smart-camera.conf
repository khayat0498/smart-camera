<VirtualHost *:443>
    ServerName imh-trade.uz

    DocumentRoot /var/www/html/smart-camera

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/imh-trade.uz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/imh-trade.uz/privkey.pem

    <Directory /var/www/html/smart-camera>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # React SPA routing
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    # Gzip compression (opencv.js 11MB -> 3.4MB)
    AddOutputFilterByType DEFLATE application/javascript text/javascript text/css text/html
    DeflateCompressionLevel 6

    # Kamera API uchun kerakli headerlar
    Header always set Permissions-Policy "camera=*"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Embedder-Policy "require-corp"

    # Katta fayllar uchun (opencv.js)
    <FilesMatch "\.(js|css|png|svg|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
</VirtualHost>

# HTTP -> HTTPS yo'naltirish
<VirtualHost *:80>
    ServerName imh-trade.uz
    Redirect permanent / https://imh-trade.uz/
</VirtualHost>
